<!DOCTYPE html>
<html lang="uk">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetterMe Quiz</title>
  <style>
    :root {
      --bg: #F4EFE8;
      --primary: #7A5C4D;

      --card: #FFFFFF;
      --text: #2B2B2B;
      --muted: #8A8A8A;
